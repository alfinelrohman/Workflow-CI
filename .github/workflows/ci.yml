name: MLflow CI Workflow

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  retrain-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn joblib matplotlib seaborn

      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager local

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/artifacts
            mlruns
            mlflow.db

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short SHA tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t elkhaqi/telco-churn-ci:latest \
            -t elkhaqi/telco-churn-ci:sha-${{ steps.vars.outputs.sha_short }} \
            ./MLProject

      - name: Push Docker image
        run: |
          docker push elkhaqi/telco-churn-ci:latest
          docker push elkhaqi/telco-churn-ci:sha-${{ steps.vars.outputs.sha_short }}